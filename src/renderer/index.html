<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none';
               script-src 'self' blob:;
               style-src 'self' 'unsafe-inline';
               worker-src 'self' blob:;
               img-src 'self' data:;
               font-src 'self' data:;
               connect-src 'self';
               base-uri 'none';
               form-action 'none';
               frame-ancestors 'none';"
    />
    <title>oxi_js</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <div class="brand-wrap">
          <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" aria-label="oxi_js">
            <path fill="currentColor" d="m212.24 83.76l-56-56A6 6 0 0 0 152 26H56a14 14 0 0 0-14 14v72a6 6 0 0 0 12 0V40a2 2 0 0 1 2-2h90v50a6 6 0 0 0 6 6h50v122a2 2 0 0 1-2 2h-24a6 6 0 0 0 0 12h24a14 14 0 0 0 14-14V88a6 6 0 0 0-1.76-4.24M158 46.48L193.52 82H158Z"/>
            <path fill="#ffffff" d="M78 152v38a24 24 0 0 1-48 0a6 6 0 0 1 12 0a12 12 0 0 0 24 0v-38a6 6 0 0 1 12 0"/>
            <path fill="#ffffff" d="m145.83 196.06a18.89 18.89 0 0 1-8.31 13.81c-4.82 3.19-10.87 4.14-16.36 4.14a59 59 0 0 1-14.68-2a6 6 0 0 1 3.23-11.56c3.71 1 15.58 3.11 21.19-.62a6.85 6.85 0 0 0 3-5.34c.58-4.43-2.08-6.26-14.2-9.76c-9.31-2.69-23.37-6.75-21.57-20.94a18.61 18.61 0 0 1 8.08-13.54c11.11-7.49 29.18-3 31.21-2.48a6 6 0 0 1-3.06 11.6c-3.78-1-15.85-3-21.45.84a6.59 6.59 0 0 0-2.88 5.08c-.41 3.22 2.14 4.78 13 7.91c9.89 2.89 24.81 7.2 22.8 22.86"/>
          </svg>
          <div class="brand">oxi<span>_js</span></div>
        </div>
        <div class="toolbar-actions">
          <select id="language" class="select" aria-label="Language">
            <option value="javascript">JavaScript</option>
            <option value="typescript">TypeScript</option>
          </select>
          <button id="export-btn" class="btn" title="Export to file">Export</button>
          <button id="run-btn" class="btn btn-primary" title="Run (⌘/Ctrl+Enter)">
            <span class="btn-icon">▶</span> Run
          </button>
          <button id="clear-btn" class="btn" title="Clear output">Clear</button>
        </div>
      </header>
      <nav id="tab-bar" class="tab-bar" aria-label="Open tabs"></nav>
      <main class="workspace">
        <section id="editor-pane" class="pane">
          <div id="editor"></div>
        </section>
        <div class="resizer" id="resizer"></div>
        <section id="output-pane" class="pane">
          <div class="output-header">
            <span>Output</span>
            <span id="duration" class="duration"></span>
          </div>
          <div id="output" class="output"></div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
